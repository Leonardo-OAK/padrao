<!DOCTYPE html>
<!--
  Arquivo: reducao-gordura-guia-interativo

  Estrutura com 2 módulos principais:

  Módulo 1 (Pilares + Gráfico de Bolinhas):
    - SECTION #m1-mod-pilares
    - Script "MODULE 1: FAT DOTS GRAPH" (primeiro <script> após JS global)

  Módulo 2 (Áreas + Imagem Híbrida da Pele):
    - SECTION #m2-mod-hibrido
    - Script "MODULE 2: SKIN LAYERS IMAGE" (segundo <script> após JS global)

  Instruções para manutenção / IA:
    - Ao ajustar Módulo 1, limite alterações à SECTION #m1-mod-pilares e ao script MODULE 1.
    - Ao ajustar Módulo 2, limite alterações à SECTION #m2-mod-hibrido e ao script MODULE 2.
    - Classes genéricas (.pill, .card, etc.) impactam ambos os módulos: alterar com cautela.
-->
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gordura Localizada</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root{
      --brand:#0ea5e9;
      --accent:#10b981;
      --warn:#f59e0b;
      --radius:18px;
      --maxw:980px;
      --txt:#0f172a;
      --txt-muted:#64748b;
      --border:#e2e8f0;
      --bg:#ffffff;
      --bg-soft:#f8fafc;
      --brand-soft:#e0f2fe;
      --brand-deep:#0369a1;
      --brand-shadow:rgba(14,165,233,.26);
    }

    html,body{
      background:#f1f5f9;
      color:var(--txt);
    }

    .card{
      background:var(--bg);
      border-radius:var(--radius);
      padding:1.5rem;
      box-shadow:0 6px 18px rgba(15,23,42,.06);
      border:1px solid var(--border);
    }

    .pill{
      appearance:none;
      border:1px solid rgba(15,23,42,.08);
      background:linear-gradient(180deg,rgba(255,255,255,.92),rgba(248,250,252,.9));
      border-radius:14px;
      padding:.7rem 1rem;
      font-size:.9rem;
      font-weight:600;
      color:var(--txt);
      display:inline-flex;
      align-items:center;
      gap:.45rem;
      cursor:pointer;
      transition:transform .12s ease,box-shadow .16s ease,border-color .16s ease,background .16s ease;
      box-shadow:0 2px 6px rgba(15,23,42,.06);
      width:100%;
      text-align:left;
    }
    .pill:hover{
      transform:translateY(-1px);
      box-shadow:0 6px 16px rgba(15,23,42,.10);
      border-color:rgba(14,165,233,.35);
    }
    .pill:active{
      transform:translateY(1px) scale(.99);
      box-shadow:0 3px 8px rgba(15,23,42,.10);
    }
    .pill:focus-visible{
      outline:none;
      box-shadow:0 0 0 3px rgba(14,165,233,.35);
      border-color:rgba(14,165,233,.6);
    }

    .pill-on{
      background:linear-gradient(180deg,rgba(14,165,233,.18),rgba(14,148,233,.10));
      border-color:var(--brand);
      color:#0f172a;
      box-shadow:0 8px 20px var(--brand-shadow);
    }
    .pill-off{}

    .pill-indicator::after{
      content:"▾";
      font-size:.78rem;
      opacity:.7;
      margin-left:.25rem;
      transition:transform .2s ease;
    }
    .pill-on.pill-indicator::after{
      transform:rotate(180deg);
    }

    .brand-logo-header{
      height:clamp(28px,6vw,52px);
      width:auto;
      display:block;
    }
    .brand-logo-footer{
      height:clamp(48px,8vw,128px);
      width:auto;
      opacity:.9;
      display:block;
      margin:0 auto .5rem;
    }

    .brand-title{
      color:var(--brand);
    }

    .pilares-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:.5rem;
    }

    .result-header{
      display:flex;
      align-items:center;
      gap:.75rem;
      margin:.6rem 0 .35rem;
    }

    .result-title{
      display:flex;
      align-items:center;
      gap:.4rem;
      font-weight:800;
      color:#0b2a6b;
      font-size:.95rem;
    }
    .result-title-dot{
      width:.6rem;
      height:.6rem;
      border-radius:999px;
      background:#0b2a6b;
      box-shadow:0 0 0 3px rgba(11,42,107,.16);
    }

    .potential{
      display:flex;
      align-items:center;
      gap:.5rem;
      flex:1;
      min-width:200px;
    }
    .potential__label{
      font-size:.8rem;
      font-weight:700;
      color:var(--txt);
    }
    .potential__bar{
      position:relative;
      flex:1;
      height:10px;
      border-radius:999px;
      background:linear-gradient(180deg,#eff6ff,#e2e8f0);
      box-shadow:inset 0 1px 2px rgba(15,23,42,.14);
      overflow:hidden;
    }
    .potential__fill{
      position:absolute;
      inset:0 auto 0 0;
      width:0%;
      border-radius:999px;
      background:linear-gradient(90deg,var(--brand),var(--brand-deep));
      transition:width .25s cubic-bezier(.2,.8,.2,1);
    }
    .potential__value{
      font-size:.8rem;
      font-weight:700;
      min-width:3ch;
      text-align:right;
      color:var(--txt);
    }

    .result-wrap{
      display:flex;
      justify-content:center;
      margin-top:.2rem;
    }
    .illu{
      max-width:640px;
      width:100%;
    }

    #m1-dots>.dot{
      transition:opacity .6s ease,transform .35s ease;
      transform-origin:center;
    }
    #m1-dots>.dot.dot--off{
      opacity:.15;
    }

    .grid-cards{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:.4rem;
    }
    @media (min-width:768px){
      .grid-cards{
        grid-template-columns:repeat(3,minmax(0,1fr));
      }
    }

    .hyb-wrap{
      position:relative;
      max-width:var(--maxw);
      border-radius:var(--radius);
      border:1px solid var(--border);
      overflow:hidden;
      background:#ffffff;
    }
    .hyb-wrap img{
      width:100%;
      height:auto;
      display:block;
      user-select:none;
      pointer-events:none;
    }
    .hyb-layer{
      position:absolute;
      inset:0;
      opacity:0;
      transition:opacity .18s ease;
    }
    .hyb-layer.on{
      opacity:1;
    }

    .pillar-local{
      position:relative;
    }
    .pillar-local .pill-sub{
      position:absolute;
      top:calc(100% + 8px);
      left:0;
      width:min(92vw,480px);
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:.4rem;
      padding:.6rem;
      background:#ffffff;
      border-radius:14px;
      border:1px solid var(--border);
      box-shadow:0 10px 30px rgba(15,23,42,.18);
      opacity:0;
      transform:translateY(-6px);
      pointer-events:none;
      visibility:hidden;
      transition:opacity .22s ease,transform .22s ease,visibility 0s linear .22s;
      z-index:40;
    }
    .pillar-local .pill-sub.is-open{
      opacity:1;
      transform:translateY(0);
      pointer-events:auto;
      visibility:visible;
      transition:opacity .22s ease,transform .22s ease,visibility 0s linear 0s;
    }

    /* Medidor de Densidade de gordura padrão (Módulo 2) */
    .area-meter{
      margin-top:.75rem;
      display:flex;
      flex-direction:column;
      gap:.25rem;
      font-size:.75rem;
      color:var(--txt-muted);
    }
    .area-meter__label{
      font-weight:600;
      color:var(--txt);
    }
    .area-meter__bar{
      position:relative;
      width:100%;
      height:8px;
      border-radius:999px;
      background:linear-gradient(180deg,#fef3c7,#fee2c5);
      box-shadow:inset 0 1px 2px rgba(15,23,42,.18);
      overflow:hidden;
    }
    .area-meter__fill{
      position:absolute;
      inset:0 auto 0 0;
      width:0%;
      border-radius:999px;
      background:linear-gradient(90deg,#f59e0b,#b45309);
      transition:width .25s cubic-bezier(.2,.8,.2,1);
    }
    .area-meter__value{
      font-weight:600;
      color:var(--txt-muted);
    }

    @media (max-width:520px){
      .pillar-local .pill-sub{
        width:min(96vw,480px);
        grid-template-columns:1fr;
      }
    }

    @media print{
      .no-print{display:none!important;}
      body{background:#ffffff;}
    }

    @media (max-width:480px){
      .pilares-grid{
        grid-template-columns:1fr;
      }
    }

    @media (min-width:1280px){
      .illu{max-width:840px;}
      .hyb-wrap{max-width:1100px;}
    }

    @media (min-width:1440px){
      body{font-size:17px;}
    }
  </style>
</head>

  <!-- MODULE 1: FAT DOTS GRAPH -->
  <script>
  (function(){
    const CONFIG_M1 = {
      totalDots: 220,
      baseFactor: 0.72,
      penaltyNoDiet: 0.90,
      pillars: {
        diet:   { weight: 0.45 },
        treino: { weight: 0.15 }
      },
      local: {
        baseWeight: 0.30,
        modes: {
          EU: { label: "Enzimas + Ultrassom", multiplier: 1.25 },
          HU: { label: "Hidrolipo + Ultrassom", multiplier: 0.90 }
        }
      },
      metabMultiplier: 1.20
    };

    const TOTAL = CONFIG_M1.totalDots;

    const state = {
      diet: false,
      treino: false,
      metab: false,
      localMode: null
    };

    const btnDiet   = document.getElementById('m1-bDiet');
    const btnTreino = document.getElementById('m1-bTreino');
    const btnMetab  = document.getElementById('m1-bMetab');
    const btnLocal  = document.getElementById('m1-bLocal');
    const btnEU     = document.getElementById('m1-bLocalEU');
    const btnHU     = document.getElementById('m1-bLocalHU');
    const localBox  = document.getElementById('m1-localModes');

    const svg       = document.getElementById('m1-resultSvg');
    const dotsG     = document.getElementById('m1-dots');
    const fillEl    = document.getElementById('m1-resultFill');
    const valEl     = document.getElementById('m1-resultValue');
    const barEl     = document.getElementById('m1-potentialBar');

    if(!svg || !dotsG){ return; }

    const positions = (function(n){
      const arr = [];
      let seed = 1337;
      function rnd(){
        seed = (seed * 1664525 + 1013904223) % 4294967296;
        return seed / 4294967296;
      }
      for(let i=0;i<n;i++){
        arr.push({ x: 40 + rnd()*480, y: 40 + rnd()*240 });
      }
      return arr;
    })(TOTAL);

    function setPill(el, on){
      if(!el) return;
      el.setAttribute('aria-pressed', String(!!on));
      el.classList.toggle('pill-on', !!on);
      el.classList.toggle('pill-off', !on);
    }

    function computePotencial(cfg, state){
      const {
        totalDots,
        baseFactor,
        penaltyNoDiet,
        pillars,
        local,
        metabMultiplier
      } = cfg;

      const hasDiet = !!state.diet;
      const factorOthers = hasDiet ? 1 : penaltyNoDiet;

      let sum = 0;

      if(state.diet){
        sum += pillars.diet.weight;
      }
      if(state.treino){
        sum += pillars.treino.weight * factorOthers;
      }
      if(state.localMode){
        const mode = local.modes[state.localMode];
        if(mode){
          sum += local.baseWeight * factorOthers * mode.multiplier;
        }
      }

      if(state.metab && sum > 0){
        sum *= metabMultiplier;
      }

      const frac = baseFactor * sum;
      const rawRemove = Math.round(totalDots * frac);
      const toRemove = Math.max(0, Math.min(totalDots, rawRemove));
      const pct = Math.max(0, Math.min(100, Math.round((toRemove / totalDots) * 100)));

      return { toRemove, pct };
    }

    function render(){
      const { toRemove, pct } = computePotencial(CONFIG_M1, state);

      if(fillEl) fillEl.style.width = pct + '%';
      if(valEl)  valEl.textContent  = pct + '%';
      if(barEl)  barEl.setAttribute('aria-valuenow', String(pct));

      dotsG.innerHTML = '';

      let survivors = [];
      const removedIdx = new Set();

      if(toRemove <= 0){
        survivors = positions.slice();
      } else if(state.localMode){
        const cx = 280, cy = 160;
        const ordered = positions
          .map((p,i)=>({ i, d:(p.x-cx)**2 + (p.y-cy)**2 }))
          .sort((a,b)=>a.d-b.d);
        ordered.slice(0,toRemove).forEach(o=>removedIdx.add(o.i));
        survivors = positions.filter((_,i)=>!removedIdx.has(i));
      } else {
        const idx = Array.from({length: TOTAL}, (_,i)=>i);
        let s = 2025;
        const rr = ()=>((s = (s*1103515245 + 12345) & 0x7fffffff)/0x7fffffff);
        for(let i=idx.length-1;i>0;i--){
          const j = Math.floor(rr()*(i+1));
          [idx[i], idx[j]] = [idx[j], idx[i]];
        }
        idx.slice(0,toRemove).forEach(i=>removedIdx.add(i));
        survivors = positions.filter((_,i)=>!removedIdx.has(i));
      }

      survivors.forEach(p=>{
        const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
        c.setAttribute('cx', p.x);
        c.setAttribute('cy', p.y);
        c.setAttribute('r', 3.6);
        c.setAttribute('fill', '#f59e0b');
        c.setAttribute('filter', 'url(#dotShadow)');
        c.classList.add('dot');
        dotsG.appendChild(c);
      });

      removedIdx.forEach(i=>{
        const p = positions[i];
        const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
        c.setAttribute('cx', p.x);
        c.setAttribute('cy', p.y);
        c.setAttribute('r', 3.6);
        c.setAttribute('fill', '#f59e0b');
        c.setAttribute('filter', 'url(#dotShadow)');
        c.classList.add('dot');
        dotsG.appendChild(c);
        setTimeout(()=>{ c.classList.add('dot--off'); },40);
      });
    }

    // Dieta
    btnDiet && btnDiet.addEventListener('click', ()=>{
      state.diet = !state.diet;
      setPill(btnDiet, state.diet);
      render();
    });

    // Treino
    btnTreino && btnTreino.addEventListener('click', ()=>{
      state.treino = !state.treino;
      setPill(btnTreino, state.treino);
      render();
    });

    // Metabólico
    btnMetab && btnMetab.addEventListener('click', ()=>{
      state.metab = !state.metab;
      setPill(btnMetab, state.metab);
      render();
    });

    // Estímulo Local: apenas abre/fecha; não limpa seleção dos sub-estímulos
    if(btnLocal && localBox){
      btnLocal.addEventListener('click', (e)=>{
        e.preventDefault();
        const open = !localBox.classList.contains('is-open');
        localBox.classList.toggle('is-open', open);
        btnLocal.setAttribute('aria-expanded', String(open));
        setPill(btnLocal, open || !!state.localMode);
      });
    }

    // Enzimas + Ultrassom
    if(btnEU){
      btnEU.addEventListener('click', (e)=>{
        e.preventDefault();
        const active = state.localMode !== 'EU';
        state.localMode = active ? 'EU' : null;
        setPill(btnEU, active);
        setPill(btnHU, false);
        setPill(btnLocal, !!state.localMode || localBox.classList.contains('is-open'));
        render();
      });
    }

    // Hidrolipo + Ultrassom
    if(btnHU){
      btnHU.addEventListener('click', (e)=>{
        e.preventDefault();
        const active = state.localMode !== 'HU';
        state.localMode = active ? 'HU' : null;
        setPill(btnHU, active);
        setPill(btnEU, false);
        setPill(btnLocal, !!state.localMode || localBox.classList.contains('is-open'));
        render();
      });
    }

    render();
  })();
  </script>

  <!-- MODULE 2: SKIN LAYERS IMAGE + DENSIDADE DE GORDURA PADRÃO -->
  <script>
  (function(){
    const AREAS = [
      'Braço',
      'Papada',
      'Abdômen',
      'Costas',
      'Interno de coxa'
    ];

    // Densidade de gordura padrão (0 a 3) por área
    const AREA_INTENSITY = {
      'Braço': 2.5,
      'Papada': 2,
      'Abdômen': 3,
      'Costas': 1,
      'Interno de coxa': 2
    };
    const AREA_INTENSITY_MAX = 3;

    // Mapa de estímulos (mantém chave PROTO por legado; representa Estímulos)
    const PROTO = {
      enzimas:{label:'Enzimas',blurb:'Ação química na gordura subcutânea (lipólise).',el:'#m2-l-enzimas'},
      ultrassom:{label:'Ultrassom',blurb:'Ondas atravessam a gordura subcutânea (efeito cavitacional).',el:'#m2-l-ultra'},
      metabolica:{label:'Metabólica',blurb:'Ativação metabólica/linfática na interface derme-subcutâneo.',el:'#m2-l-metab'},
      hidrolipo:{label:'Hidrolipo',blurb:'Infiltração líquida no subcutâneo (ilustrativo).',el:'#m2-l-hidro'}
    };

    const areasWrap      = document.getElementById('m2-areas');
    const protosWrap     = document.getElementById('m2-protos');
    const blurbEl        = document.getElementById('m2-blurb');
    const areaMeterBar   = document.getElementById('m2-areaMeterFill');
    const areaMeterValue = document.getElementById('m2-areaMeterValue');

    const state = { area:null, proto:null };

    if(!areasWrap || !protosWrap || !blurbEl) return;

    function setPill(el,on){
      if(!el) return;
      el.setAttribute('aria-pressed',String(!!on));
      el.classList.toggle('pill-on',!!on);
      el.classList.toggle('pill-off',!on);
    }
    function clearProtosSelection(){
      Array.from(protosWrap.children).forEach(c=>setPill(c,false));
    }
    function clearAreasSelection(){
      Array.from(areasWrap.children).forEach(c=>setPill(c,false));
    }
    function hideAllLayers(){
      ['m2-l-enzimas','m2-l-ultra','m2-l-metab','m2-l-hidro'].forEach(id=>{
        const el=document.getElementById(id);
        if(el) el.classList.remove('on');
      });
    }

    // Sufixo de densidade: aparece apenas quando há área selecionada
    function getDensitySuffix(){
      if(!state.area) return '';
      const score = AREA_INTENSITY[state.area];
      if(score == null) return '';
      return ` Causando efeito na gordura de densidade: ${score}`;
    }

    // Atualiza o medidor com base apenas na área selecionada
    function updateAreaIntensity(){
      if(!areaMeterBar || !areaMeterValue) return;

      if(!state.area){
        areaMeterBar.style.width = '0%';
        areaMeterValue.textContent = '0 / ' + AREA_INTENSITY_MAX;
        return;
      }

      const score = AREA_INTENSITY[state.area] ?? 0;
      const pct = (score / AREA_INTENSITY_MAX) * 100;
      areaMeterBar.style.width = pct + '%';
      areaMeterValue.textContent = score + ' / ' + AREA_INTENSITY_MAX;
    }

    // Atualiza texto explicativo e layers conforme área/estímulo selecionados
    function updateTextAndLayers(){
      hideAllLayers();

      // Nenhuma área e nenhum estímulo: texto base, sem densidade
      if(!state.area && !state.proto){
        blurbEl.textContent = 'Selecione área e estímulo para ver onde atuamos.';
        return;
      }

      // Área selecionada, sem estímulo: instrução + densidade
      if(state.area && !state.proto){
        blurbEl.textContent =
          'Escolha o estímulo para destacar a camada.' +
          getDensitySuffix();
        return;
      }

      // Estímulo selecionado, sem área: apenas descrição do estímulo
      if(!state.area && state.proto){
        blurbEl.textContent =
          `${PROTO[state.proto].blurb} `;
      } else {
        // Estímulo + área: descrição do estímulo + densidade dinâmica da área
        blurbEl.textContent =
          `${PROTO[state.proto].blurb}` +
          getDensitySuffix();
      }

      const layerSel = document.querySelector(PROTO[state.proto].el);
      if(layerSel) layerSel.classList.add('on');
    }

    function renderAreas(){
      AREAS.forEach(area=>{
        const b=document.createElement('button');
        b.type='button';
        b.className='pill pill-off';
        b.textContent=area;
        b.setAttribute('aria-pressed','false');
        b.addEventListener('click',()=>{
          if(state.area===area){
            state.area=null;
            clearAreasSelection();
          }else{
            state.area=area;
            clearAreasSelection();
            setPill(b,true);
          }
          updateTextAndLayers();
          updateAreaIntensity();
        });
        areasWrap.appendChild(b);
      });
    }

    function renderProtos(){
      Object.entries(PROTO).forEach(([key,conf])=>{
        const b=document.createElement('button');
        b.type='button';
        b.className='pill pill-off';
        b.textContent=conf.label;
        b.setAttribute('aria-pressed','false');
        b.addEventListener('click',()=>{
          if(state.proto===key){
            state.proto=null;
            clearProtosSelection();
          }else{
            state.proto=key;
            clearProtosSelection();
            setPill(b,true);
          }
          updateTextAndLayers();
        });
        protosWrap.appendChild(b);
      });
    }

    // Pré-carrega camadas (ajustado para pasta img/)
    ['img/enzimas.webp','img/ultrassom.webp','img/metabolica.webp','img/hidrolipo.webp'].forEach(src=>{
      const img=new Image();
      img.src=src;
    });

    renderAreas();
    renderProtos();
    updateTextAndLayers();
    updateAreaIntensity();
  })();
  </script>
</body>
</html>
